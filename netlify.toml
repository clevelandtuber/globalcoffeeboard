# Netlify configuration — static site, no build step
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long cache for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Pretty URLs
[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/knowledge"
  to = "/knowledge.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

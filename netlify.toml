# Netlify configuration — Astro static build
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Server-side functions (reachable at /api/prices and /api/cbi)
[functions]
  directory = "netlify/functions"
  # pdf-parse / pdfjs don't bundle cleanly — ship them as-is
  external_node_modules = ["pdf-parse"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long cache for hashed build assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
